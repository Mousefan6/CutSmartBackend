services:
  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    volumes:
      - ./server:/app/server

  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

# Persist MongoDB data across container restarts
volumes:
  mongo_data:
